<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<div id="out"></div>
<script>
const products = [
  {id:1,name:'Samsung Galaxy A14',price:12000,oldPrice:14000,stock:8,image:'https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-a14-5g.jpg',badge:'sale',battery:'5000mAh',camera:'50MP',storage:'64GB',colors:['Black','White'],desc:'Test phone'},
  {id:2,name:'iPhone 13',price:55000,oldPrice:60000,stock:3,image:'https://fdn2.gsmarena.com/vv/bigpic/apple-iphone-13.jpg',badge:'hot',battery:'3227mAh',camera:'12MP',storage:'128GB',colors:['Black','White'],desc:'Test phone'}
];
document.getElementById('out').innerHTML = products.map(p =>
  `<div style="border:1px solid #ccc;padding:10px;margin:10px;border-radius:8px">
    <img src="${p.image}" style="width:80px;height:80px;object-fit:cover">
    <h3>${p.name}</h3>
    <p>${p.price.toLocaleString()} ETB</p>
    <button onclick="alert('Buy ${p.name}')">Buy</button>
  </div>`
).join('');
</script>
</body>
</html>
